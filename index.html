<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="eLauncher">
  <meta name="application-name" content="eLauncher">
  <meta name="theme-color" content="#4fc3f7">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>eLauncher</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #0d0d1a;
      overflow: hidden;
      touch-action: manipulation;
      font-family: sans-serif;
    }

    /* ── Splash screen ── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: radial-gradient(ellipse at center, #1a1a3e 0%, #0d0d1a 70%);
      transition: opacity 0.5s ease;
    }
    #splash.hide {
      opacity: 0;
      pointer-events: none;
    }
    #splash img {
      width: 108px;
      height: 108px;
      border-radius: 24px;
      border: 2px solid #4fc3f7;
      object-fit: cover;
      animation: pulse 2s ease-in-out infinite;
      box-shadow: 0 0 24px rgba(79,195,247,0.4);
    }
    #splash h1 {
      margin: 0;
      font-size: 1.7rem;
      font-weight: 700;
      color: #e0f7ff;
      letter-spacing: 0.06em;
    }
    #splash p {
      margin: 0;
      font-size: 0.82rem;
      color: #7ecff5;
      letter-spacing: 0.03em;
    }
    .dots {
      display: flex;
      gap: 7px;
    }
    .dots span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4fc3f7;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 24px rgba(79,195,247,0.4); }
      50% { transform: scale(1.05); box-shadow: 0 0 36px rgba(79,195,247,0.7); }
    }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-8px); opacity: 1; }
    }

    /* ── iframe ── */
    iframe {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <!-- Splash screen -->
  <div id="splash">
    <img src="icon-192.png" alt="eLauncher">
    <h1>eLauncher</h1>
    <div class="dots">
      <span></span><span></span><span></span>
    </div>
    <p>Memuatkan...</p>
  </div>

  <!-- App iframe -->
  <iframe id="appFrame" src="" allowfullscreen
    allow="camera; microphone; clipboard-write"></iframe>

  <script>
    // ── App config ──────────────────────────────────────────────
    const _c = [
      'aHR0cHM6Ly9zY3JpcHQuZ29vZ2xlLmNvbS9hL21hY3Jvcy9tb2UtZGwuZWR1Lm15L3MvQUtmeWNieWtmZHljcVM4SGxvcllUZEdoWThrZVEzNi1UQWZKdFVoTWFXYTdZTzdCMXZhTVJlcFREZXBEcDhZenB4S2sybmRwL2V4ZWM='
    ];
    const _url = atob(_c[0]);

    // Set iframe src
    const frame = document.getElementById('appFrame');
    frame.src = _url;

    // Hide splash once iframe loads
    frame.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('splash').classList.add('hide');
        setTimeout(() => {
          document.getElementById('splash').remove();
        }, 600);
      }, 400);
    });

    // Fallback: hide splash after 8s
    setTimeout(() => {
      const s = document.getElementById('splash');
      if (s) s.classList.add('hide');
    }, 8000);

    // ── Service Worker ───────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/elauncher/sw.js')
          .then(r => console.log('[eLauncher] SW registered:', r.scope))
          .catch(e => console.warn('[eLauncher] SW failed:', e));
      });
    }

    // ── PWA install prompt ───────────────────────────────────────
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
    });
  </script>
</body>
</html>
